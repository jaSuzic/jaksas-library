<div class="wrapper">
  <h3 mat-dialog-title>{{ data.edit ? "Edit book" : "Add new book" }}</h3>
  <div mat-dialog-content>
    <form [formGroup]='form'>
      <mat-form-field>
        <input matInput placeholder="First name" type="text" formControlName='firstName' />
      </mat-form-field>

      <mat-form-field>
        <input matInput placeholder="Last name" type="text" formControlName='lastName' />
      </mat-form-field>

      <div class='image-preview' *ngIf='imagePreview!=="" && imagePreview'>
        <img [src]='imagePreview' [alt]='form.value.email'>
      </div>
      <mat-form-field>
        <input matInput placeholder="email" type="email" formControlName='email' />
      </mat-form-field>


      <mat-form-field>
        <mat-label>Select position:</mat-label>
        <mat-select formControlName='position'>
          <mat-option value="librarian">
            Librarian
          </mat-option>
          <mat-option value="admin">
            Admin
          </mat-option>
          <mat-option [disabled]='user.position!=="super-admin"' value="super-admin">
            Super-admin
          </mat-option>
        </mat-select>
      </mat-form-field>
      <div>
        <button mat-stroked-button type='button' (click)='filePicker.click()'>Pick image</button>
        <input type="file" name="" id="" #filePicker accept="image/*" (change)="onImagePicked($event)">
      </div>
      <button mat-button color="primary" [mat-dialog-close]="false">
        Close
      </button>
      <button mat-button color="primary" (click)="save()">
        {{ data.edit ? "Save" : "Add" }}
      </button>
      <button mat-button *ngIf="data.edit" color="warn" (click)="delete()">
        Delete
      </button>
    </form>
  </div>
</div>
