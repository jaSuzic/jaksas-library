<mat-card>
  <mat-card-header>
    <mat-card-subtitle>Chose return date:</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <mat-form-field class="example-full-width">
      <input matInput [min]="rentDate" [(ngModel)]="returnDate" [matDatepicker]="picker" placeholder="Choose a date">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
  </mat-card-content>
  <mat-card-actions>
    <button mat-raised-button color="primary" (click)='returnBook()'>Save</button>
    <button mat-raised-button color="primary" [mat-dialog-close]>Cancel</button>
  </mat-card-actions>
</mat-card>
