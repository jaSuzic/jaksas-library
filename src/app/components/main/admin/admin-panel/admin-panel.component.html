<mat-card>
  <mat-card-title>Admin panel</mat-card-title>
  <mat-card-content>
    <app-change-pass></app-change-pass>

    <app-change-image></app-change-image>

    <app-register-user *ngIf='user.position === "admin" || user.position === "super-admin"'></app-register-user>

    <app-list-users *ngIf='user.position === "admin" || user.position === "super-admin"'></app-list-users>
  </mat-card-content>


</mat-card>
