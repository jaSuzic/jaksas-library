<mat-accordion>
  <mat-expansion-panel>
    <mat-expansion-panel-header>
      <mat-panel-title>
        Change image
      </mat-panel-title>
      <mat-panel-description>
        Click here if you want to change your picture
      </mat-panel-description>
    </mat-expansion-panel-header>
    <div class='image-preview' *ngIf='imagePreview!=="" && imagePreview'>
      <img [src]='imagePreview' [alt]='form.value.title'>
    </div>

    <div>
      <button mat-stroked-button type='button' (click)='filePicker.click()'>Pick image</button>
      <input type="file" name="" id="" #filePicker accept="image/*" (change)="onImageChange($event)">
    </div>

    <button mat-raised-button [disabled]='imageFormControl.invalid' (click)='sendNewImage()'></button>
  </mat-expansion-panel>
</mat-accordion>
