<div *ngIf="selectedRent">
  <app-edit-rent
    (updatedRent)="saveChanges($event)"
    [selectedRent]="selectedRent"
  ></app-edit-rent>
</div>

<mat-form-field>
  <input
    matInput
    (keyup)="applyFilter($event.target.value)"
    placeholder="Filter"
  />
</mat-form-field>

<div class="mat-elevation-z8">
  <table mat-table [dataSource]="dataSource" matSort>
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Member name</th>
      <td mat-cell *matCellDef="let row">{{ row.lastName }} {{ row.name }}</td>
    </ng-container>

    <!-- Book Column -->
    <ng-container matColumnDef="book">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Book title</th>
      <td mat-cell *matCellDef="let row">{{ row.book }}</td>
    </ng-container>

    <!-- Author Column -->
    <ng-container matColumnDef="author">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Book author</th>
      <td mat-cell *matCellDef="let row">
        {{ row.author }}
      </td>
    </ng-container>

    <!-- RentDate Column -->
    <ng-container matColumnDef="rentDate">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Rent date</th>
      <td mat-cell *matCellDef="let row">
        {{ row.rentDate | date: "dd/MM/yyyy" }}
      </td>
    </ng-container>

    <!-- Buttons Columns -->
    <ng-container matColumnDef="btnEdit">
      <th mat-header-cell *matHeaderCellDef mat-sort-header></th>
      <td mat-cell *matCellDef="let row">
        <button
          mat-raised-button
          color="primary"
          class="m-2"
          (click)="editRent(row)"
        >
          Edit rent
        </button>
      </td>
      <!-- <mat-icon>history</mat-icon> -->
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20, 50]"></mat-paginator>
</div>
