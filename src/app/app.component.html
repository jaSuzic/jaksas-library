<div class="col-12 p-0">
  <div class="col-12 p-0 primary-background">
    <div class="col-9 mx-auto">
      <app-header *ngIf="isAuth"></app-header>
    </div>
  </div>
  <mat-sidenav-container>
    <mat-sidenav #sidenav mode="side" [(opened)]="opened">
      <app-sidenav (clicked)="closeSidenav()"></app-sidenav>
    </mat-sidenav>

    <mat-sidenav-content class="full-screen-height">
      <div class="col-9 mx-auto">
        <button mat-button class='menu-btn' (click)="sidenav.toggle()" *ngIf="isAuth">
          <mat-icon>menu</mat-icon>
        </button>
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
